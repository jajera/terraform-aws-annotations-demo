<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="S3 Annotations demo — GeoNet Te Kaha camera images of Whakaari/White Island"
    />
    <title>S3 Annotations Demo</title>
    <script>
      (function () {
        var stored = localStorage.getItem('volcano-gallery-theme');
        var theme =
          stored ||
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = theme === 'light' ? 'light' : 'dark';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
